<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up - Smart Campus RMS</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="auth-container">
  <div class="logo" style="text-align:center;margin-bottom:8px"><img src="/assets/smart-campus.webp" alt="Smart Campus banner" style="max-width:360px;height:auto;border-radius:6px"/></div>
      <h2>Create an account</h2>
      <form id="signup-form">
        <label>Name</label>
        <input type="text" id="name" />
        <label>Email</label>
        <input type="email" id="email" required />
        <label>Password</label>
        <input type="password" id="password" required />
        <button class="btn" type="submit">Sign up</button>
      </form>
      <p>Already have an account? <a href="/signin.html">Sign in</a></p>
    </main>
    <script src="/js/auth.js"></script>
  </body>
</html>
